# nginx.conf — served by the Railway frontend service.
#
# Before nginx starts, start.sh runs envsubst to replace ${API_INTERNAL_URL}
# with the Railway internal URL of the api service, e.g.:
#   https://<api-service>.railway.internal
#
# Set API_INTERNAL_URL as an environment variable on the frontend Railway service,
# referencing the api service: ${{api.RAILWAY_PRIVATE_DOMAIN}}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy GL API routes to the backend service.
    # Matches /upload, /analyze/*, /row/*, /export/*, /health
    location ~ ^/(upload|analyze|row|export|health)(/|$) {
        proxy_pass ${API_INTERNAL_URL};
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large GL file uploads (matches backend 20 MB limit)
        client_max_body_size 20m;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
    }

    # Serve React app — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # Cache built assets aggressively (Vite fingerprints filenames)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
